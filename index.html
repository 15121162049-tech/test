<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla 波动效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 特斯拉波动效果核心 */
    .wave-container {
      position: relative;
      width: 300px;
      height: 300px;
    }
    .wave {
      position: absolute;
      border-radius: 50%;
      border: 2px solid #00bfff;
      opacity: 0;
      animation: tesla-wave 4s ease-out infinite;
    }
    .wave:nth-child(2) {
      animation-delay: 1s;
    }
    .wave:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes tesla-wave {
      0% {
        transform: scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    /* 中间图标 */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: #00bfff;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="center"></div>
  </div>
</body>
</html>
